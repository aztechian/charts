name: Helm Chart linting

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
    tags:
      - v*

# This ensures that previous jobs for the PR are canceled when the PR is
# updated.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Run helm lint
        run: |
          set +e
          ERROR=0
          for c in */Chart.yaml; do
            chart=$(dirname "$c")
            echo "::group::Linting $chart"
            helm lint "$chart" || ERROR=1
            echo "::endgroup::"
          done
          exit $ERROR
  helm-docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Install helm-docs
        run: |
          hd_ver=$(grep '^helm-docs' .tool-versions| cut -f2 -d ' ')
          echo "::debug::helm-docs version = ${hd_ver}"
          cd /tmp
          curl -sL "https://github.com/norwoodj/helm-docs/releases/download/v${hd_ver}/helm-docs_${hd_ver}_Linux_x86_64.tar.gz" | tar xzf - && \
          chmod +x ./helm-docs
          mv ./helm-docs /usr/local/bin/

      - name: Run helm-docs
        run: |
          helm-docs

      - name: Test for changes
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add .
          mods=$(git diff --name-only --cached)
          if [[ -z $mods ]]; then
            exit 0
          else
            for f in ${mods}; do
              echo "::warning file=${f},title=${f}::file would be updated by helm-docs"
            done
            git commit -m '[BOT] Updating READMEs from helm-docs'
            git push -u origin HEAD
            echo "::notice::The PR has been updated with a new commit"
          fi
  helm-package-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Find Changed Charts
        id: changed-charts
        run: |
          git fetch --tags origin 2>/dev/null
          base=$(git merge-base HEAD origin/${{ github.base_ref || 'main' }})
          echo "::debug::using merge-base ${base} against origin/${{ github.base_ref || 'main' }}"
          changed=""
          for chart in $(git diff --find-renames --name-only "$base" -- . | cut -d'/' -f1 | sort -u); do
            [[ -d "$chart" && -f "$chart/Chart.yaml" ]] || continue
            latest_tag=$(git tag --list "${chart}-*" --sort=-version:refname | head -1)
            echo "::debug::chart=${chart} latest_tag=${latest_tag}"
            [[ -z "$latest_tag" ]] && continue  # new chart, no version bump required
            if git diff --quiet "$latest_tag" -- "$chart/Chart.yaml"; then
              changed+="${chart}"$'\n'
            fi
          done
          changed="${changed%$'\n'}"
          echo "::debug::charts needing version bump = ${changed}"
          {
            echo "changed<<EOF"
            echo "$changed"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Comment PR with notice of changed chart
        if: always()
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            Hey there,
            We noticed that you have modified the following chart(s):

            ```
            ${{ steps.changed-charts.outputs.changed }}
            ```

            Before merging, you will need to bump the chart version so that it will publish properly. Please update the Chart.yaml of these charts, and push to this PR again.
          comment-tag: releasecheck
          mode: ${{ steps.changed-charts.outputs.changed != '' && 'recreate' || 'delete' }}
          create-if-not-exists: ${{ steps.changed-charts.outputs.changed != '' }}

      - name: fail if modified
        if: steps.changed-charts.outputs.changed != ''
        run: exit 1
